<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaHub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }
    body { background: #0f0f23; }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .update-banner {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: linear-gradient(90deg, #00d4aa, #7c3aed);
      color: white;
      padding: 8px 16px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      text-align: center;
      z-index: 10000;
      cursor: pointer;
    }

    .update-banner:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <div class="update-banner" id="update-banner" onclick="window.mediahub.applyUpdates()">
    Update available — click to install
  </div>
  <iframe id="app-frame" src="https://localhost:3443"></iframe>

  <script>
    // Show update banner when available
    window.mediahub.onUpdateAvailable(() => {
      document.getElementById('update-banner').style.display = 'block';
    });
  </script>
</body>
</html>
