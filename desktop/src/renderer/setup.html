<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MediaHub — Setup</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e0e0e0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-app-region: drag;
      user-select: none;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 48px;
      -webkit-app-region: no-drag;
    }

    .logo {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #00d4aa, #7c3aed);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      font-weight: 800;
      color: white;
      box-shadow: 0 8px 32px rgba(0, 212, 170, 0.3);
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
      color: #ffffff;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 48px;
    }

    .status {
      font-size: 15px;
      color: #00d4aa;
      margin-bottom: 24px;
      min-height: 24px;
      transition: all 0.3s ease;
    }

    .status.error {
      color: #ff6b6b;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #00d4aa, #7c3aed);
      border-radius: 3px;
      width: 0%;
      transition: width 0.5s ease;
    }

    .progress-text {
      font-size: 12px;
      color: #666;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(0, 212, 170, 0.3);
      border-top-color: #00d4aa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-box {
      background: rgba(255, 107, 107, 0.1);
      border: 1px solid rgba(255, 107, 107, 0.3);
      border-radius: 12px;
      padding: 20px;
      margin-top: 24px;
      text-align: left;
      font-size: 13px;
      line-height: 1.6;
      color: #ff9999;
      white-space: pre-wrap;
      display: none;
    }

    .token-input {
      display: none;
      margin-top: 24px;
    }

    .token-input input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: monospace;
      outline: none;
      margin-bottom: 12px;
    }

    .token-input input:focus {
      border-color: #00d4aa;
    }

    .token-input button {
      padding: 10px 24px;
      background: linear-gradient(135deg, #00d4aa, #7c3aed);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .token-input button:hover {
      opacity: 0.9;
    }

    .token-input p {
      font-size: 12px;
      color: #666;
      margin-bottom: 12px;
    }

    .admin-form {
      display: none;
      margin-top: 24px;
      text-align: left;
    }

    .admin-form h2 {
      font-size: 18px;
      color: #fff;
      margin-bottom: 8px;
      text-align: center;
    }

    .admin-form p {
      font-size: 13px;
      color: #888;
      margin-bottom: 20px;
      text-align: center;
    }

    .admin-form input {
      width: 100%;
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      margin-bottom: 12px;
    }

    .admin-form input:focus {
      border-color: #00d4aa;
    }

    .admin-form button {
      width: 100%;
      padding: 12px 24px;
      background: linear-gradient(135deg, #00d4aa, #7c3aed);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 4px;
    }

    .admin-form button:hover {
      opacity: 0.9;
    }

    .form-error {
      color: #ff6b6b;
      font-size: 13px;
      min-height: 20px;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">M</div>
    <h1>MediaHub</h1>
    <p class="subtitle">Social Media Management Platform</p>

    <p class="status" id="status">
      <span class="spinner"></span>
      <span id="status-text">Initializing...</span>
    </p>

    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <p class="progress-text" id="progress-text">0%</p>

    <div class="error-box" id="error-box"></div>

    <div class="token-input" id="token-input">
      <p>This repo is private. Enter a GitHub Personal Access Token with read access:</p>
      <input type="password" id="github-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <button onclick="submitToken()">Continue</button>
    </div>

    <div class="admin-form" id="admin-form">
      <h2>Create Super Admin Account</h2>
      <p>Set up your admin login credentials for MediaHub.</p>
      <input type="email" id="admin-email" placeholder="Email address" />
      <input type="password" id="admin-password" placeholder="Password (min 6 characters)" />
      <input type="password" id="admin-password-confirm" placeholder="Confirm password" />
      <div class="form-error" id="form-error"></div>
      <button onclick="submitAdmin()">Create Account & Continue</button>
    </div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const statusText = document.getElementById('status-text');
    const progressFill = document.getElementById('progress-fill');
    const progressText = document.getElementById('progress-text');
    const errorBox = document.getElementById('error-box');

    window.mediahub.onProgress((data) => {
      if (data.percent === -1) {
        // Error
        statusEl.className = 'status error';
        statusText.textContent = 'Setup failed';
        errorBox.style.display = 'block';
        errorBox.textContent = data.step.replace('Error: ', '');
        progressFill.style.width = '100%';
        progressFill.style.background = '#ff6b6b';

        // Show token input if it's a clone/auth error
        if (data.step.includes('Authentication') || data.step.includes('401') || data.step.includes('private')) {
          document.getElementById('token-input').style.display = 'block';
        }
      } else if (data.step === '__SHOW_ADMIN_FORM__') {
        // Show admin credentials form
        document.getElementById('admin-form').style.display = 'block';
        statusEl.style.display = 'none';
        document.querySelector('.progress-bar').style.display = 'none';
        progressText.style.display = 'none';
      } else {
        document.getElementById('admin-form').style.display = 'none';
        statusEl.style.display = 'block';
        document.querySelector('.progress-bar').style.display = 'block';
        progressText.style.display = 'block';
        statusText.textContent = data.step;
        progressFill.style.width = data.percent + '%';
        progressText.textContent = data.percent + '%';
      }
    });

    function submitToken() {
      const token = document.getElementById('github-token').value.trim();
      if (token) {
        window.mediahub.setGithubToken(token);
        errorBox.style.display = 'none';
        document.getElementById('token-input').style.display = 'none';
        statusEl.className = 'status';
        statusText.textContent = 'Retrying with token...';
        progressFill.style.background = 'linear-gradient(90deg, #00d4aa, #7c3aed)';
      }
    }

    function submitAdmin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;
      const confirm = document.getElementById('admin-password-confirm').value;
      const formError = document.getElementById('form-error');

      formError.textContent = '';

      if (!email || !email.includes('@')) {
        formError.textContent = 'Please enter a valid email address';
        return;
      }
      if (password.length < 6) {
        formError.textContent = 'Password must be at least 6 characters';
        return;
      }
      if (password !== confirm) {
        formError.textContent = 'Passwords do not match';
        return;
      }

      window.mediahub.submitAdminCredentials(email, password);
    }
  </script>
</body>
</html>
