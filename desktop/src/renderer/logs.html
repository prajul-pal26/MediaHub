<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MediaHub — Logs</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: #0f0f23;
      color: #c0c0c0;
      padding: 16px;
      font-size: 12px;
      line-height: 1.5;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .toolbar button {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #e0e0e0;
      font-size: 12px;
      cursor: pointer;
    }

    .toolbar button:hover { background: rgba(255, 255, 255, 0.2); }
    .toolbar button.active { background: #00d4aa; color: #000; border-color: #00d4aa; }

    #log-output {
      white-space: pre-wrap;
      word-break: break-all;
      overflow-y: auto;
      max-height: calc(100vh - 80px);
      padding: 12px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <button class="active" onclick="loadLogs()">All</button>
    <button onclick="loadLogs('app')">App</button>
    <button onclick="loadLogs('worker')">Worker</button>
    <button onclick="loadLogs('db')">Database</button>
    <button onclick="loadLogs('redis')">Redis</button>
    <button onclick="loadLogs('auth')">Auth</button>
  </div>
  <div id="log-output">Loading logs...</div>

  <script>
    async function loadLogs(service) {
      // Update active button
      document.querySelectorAll('.toolbar button').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');

      const logs = await window.mediahub.getLogs(service);
      document.getElementById('log-output').textContent = logs || 'No logs available';
    }
    loadLogs();
  </script>
</body>
</html>
